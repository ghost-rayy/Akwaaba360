services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: akwaaba360_mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Akwaaba360Password2024
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
